<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daybreak — Daily Planner</title>
<link rel="icon" type="image/svg+xml" id="favicon-link">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fullcalendar/interaction@6.1.11/index.global.min.js"></script>
<style>
:root {
  --bg:#f5f0e8; --surface:#fffdf7; --border:#e0d9c8;
  --text:#1c1712; --muted:#7a6f60; --accent:#c94a2b; --a-light:#f8eeea;
  --green:#2d7a4f; --g-light:#e5f0ea; --blue:#2a5fa5; --b-light:#e4ecf7;
  --yellow:#c49a14; --y-light:#fdf5dc; --red:#b83225; --r-light:#faeceb;
  --shadow:0 2px 14px rgba(28,23,18,.07); --shadow-lg:0 8px 40px rgba(28,23,18,.13);
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}

/* topbar */
.topbar{height:58px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;}
.brand-wrap{display:flex;align-items:center;gap:8px;}
#brand-icon{width:32px;height:32px;flex-shrink:0;}
.brand{font-family:'DM Serif Display',serif;font-size:20px;letter-spacing:-.3px;white-space:nowrap;}
.brand em{color:var(--accent);font-style:italic;}
.today-pill{background:var(--a-light);color:var(--accent);font-size:11px;font-weight:600;padding:3px 11px;border-radius:20px;white-space:nowrap;}
.spacer{flex:1;}
.stats-inline{display:flex;gap:16px;}
.stat-inline{font-size:12px;color:var(--muted);}
.stat-inline strong{color:var(--text);font-weight:600;}

/* pomodoro in topbar */
.pomo-bar{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:5px 10px;}
.pomo-task-name{font-size:11px;color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pomo-task-name.active{color:var(--accent);font-weight:500;}
.pomo-display{font-family:'DM Serif Display',serif;font-size:16px;min-width:44px;text-align:center;letter-spacing:.03em;}
.pomo-display.break{color:var(--green);}
.pomo-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);transition:all .15s;}
.pomo-btn:hover{background:var(--a-light);color:var(--accent);border-color:var(--accent);}
.pomo-btn.running{color:var(--accent);}
.pomo-sessions{font-size:11px;color:var(--muted);display:flex;gap:2px;align-items:center;}
.pomo-dot{width:6px;height:6px;border-radius:50%;background:var(--border);}
.pomo-dot.done{background:var(--accent);}
.pomo-settings-btn{font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;padding:0 2px;}
.pomo-settings-btn:hover{color:var(--text);}

.btn-add{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:7px 16px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s;white-space:nowrap;}
.btn-add:hover{opacity:.88;}

/* layout */
.body{display:grid;grid-template-columns:370px 1fr;height:calc(100vh - 58px);overflow:hidden;}

/* left panel */
.panel-left{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.panel-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);}
.panel-header h2{font-family:'DM Serif Display',serif;font-size:17px;margin-bottom:8px;}
.filter-bar{display:flex;gap:5px;flex-wrap:wrap;}
.filter-btn{border:1px solid var(--border);background:none;border-radius:20px;padding:3px 11px;font-size:11px;font-family:inherit;cursor:pointer;color:var(--muted);transition:all .15s;}
.filter-btn:hover{background:var(--bg);color:var(--text);}
.filter-btn.active{background:var(--text);color:#fff;border-color:var(--text);}

.quick-add{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:7px;}
.quick-input{flex:1;border:1px solid var(--border);border-radius:8px;padding:7px 11px;font-family:inherit;font-size:13px;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s;}
.quick-input:focus{border-color:var(--accent);}
.quick-input::placeholder{color:var(--muted);}
.quick-submit{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 13px;font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;transition:opacity .15s;}
.quick-submit:hover{opacity:.88;}

/* task list + drag */
.tasks-scroll{flex:1;overflow-y:auto;padding:10px;}
.tasks-scroll::-webkit-scrollbar{width:4px;}
.tasks-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.task-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;display:flex;align-items:flex-start;gap:9px;transition:box-shadow .15s,opacity .15s;margin-bottom:4px;cursor:grab;}
.task-card:active{cursor:grabbing;}
.task-card:hover{box-shadow:var(--shadow);}
.task-card.done{opacity:.42;}
.task-card.done .task-title{text-decoration:line-through;color:var(--muted);}
.task-card.drag-over{border-color:var(--accent);background:var(--a-light);}
.task-card.dragging{opacity:.35;box-shadow:var(--shadow-lg);}
.task-card.pomo-active{border-color:var(--accent);border-left:3px solid var(--accent);}

.drag-handle{color:var(--border);font-size:13px;cursor:grab;flex-shrink:0;margin-top:3px;user-select:none;line-height:1;}
.drag-handle:hover{color:var(--muted);}

.check-btn{width:17px;height:17px;border-radius:50%;border:2px solid var(--border);background:none;cursor:pointer;flex-shrink:0;margin-top:2px;transition:all .15s;position:relative;}
.check-btn:hover{border-color:var(--green);background:var(--g-light);}
.check-btn.checked{background:var(--green);border-color:var(--green);}
.check-btn.checked::after{content:'';position:absolute;top:1px;left:3px;width:4px;height:7px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg);}

.task-body{flex:1;min-width:0;}
.task-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:2px;}
.task-desc{font-size:11px;color:var(--muted);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.task-meta{display:flex;gap:4px;align-items:center;flex-wrap:wrap;}
.tag{font-size:10px;font-weight:600;padding:2px 6px;border-radius:7px;}
.tag.priority-high{background:var(--r-light);color:var(--red);}
.tag.priority-medium{background:var(--y-light);color:var(--yellow);}
.tag.priority-low{background:var(--g-light);color:var(--green);}
.tag.cat{background:var(--b-light);color:var(--blue);}
.tag.date{background:var(--bg);color:var(--muted);border:1px solid var(--border);}
.tag.overdue{background:var(--r-light);color:var(--red);}

.task-actions{display:flex;gap:2px;opacity:0;transition:opacity .15s;flex-shrink:0;}
.task-card:hover .task-actions{opacity:1;}
.icon-btn{width:24px;height:24px;border-radius:6px;border:1px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);transition:all .15s;}
.icon-btn:hover{background:var(--bg);color:var(--text);}
.icon-btn.del:hover{background:var(--r-light);color:var(--red);border-color:transparent;}
.icon-btn.pomo-start{font-size:11px;}
.icon-btn.pomo-start:hover{background:var(--a-light);color:var(--accent);border-color:var(--accent);}

.section-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:8px 3px 4px;margin-top:2px;}
.empty-state{text-align:center;padding:36px 20px;color:var(--muted);font-size:13px;}
.empty-state .e-icon{font-size:26px;margin-bottom:7px;}

/* right panel */
.panel-right{overflow-y:auto;padding:20px 24px;background:var(--bg);}
.panel-right::-webkit-scrollbar{width:4px;}
.panel-right::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

#calendar{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;}
.fc .fc-toolbar-title{font-family:'DM Serif Display',serif !important;font-size:18px !important;color:var(--text) !important;}
.fc .fc-button{background:var(--surface) !important;color:var(--text) !important;border:1px solid var(--border) !important;font-family:'DM Sans',sans-serif !important;font-size:12px !important;box-shadow:none !important;padding:4px 10px !important;border-radius:7px !important;}
.fc .fc-button:hover{background:var(--bg) !important;}
.fc .fc-button-primary:not(:disabled).fc-button-active{background:var(--accent) !important;border-color:var(--accent) !important;color:#fff !important;}
.fc .fc-daygrid-event{border-radius:4px !important;font-size:11px !important;padding:1px 5px !important;border:none !important;font-family:'DM Sans',sans-serif !important;cursor:grab !important;}
.fc .fc-day-today{background:var(--a-light) !important;}
.fc .fc-col-header-cell{font-size:11px !important;font-weight:600 !important;color:var(--muted) !important;}
.fc .fc-daygrid-day-number{font-size:11px !important;color:var(--muted) !important;}

/* modals */
.modal-backdrop{position:fixed;inset:0;background:rgba(28,23,18,.4);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-backdrop.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border-radius:14px;padding:24px;width:440px;max-width:calc(100vw - 40px);box-shadow:var(--shadow-lg);transform:translateY(10px);transition:transform .2s;}
.modal-backdrop.open .modal{transform:translateY(0);}
.modal h2{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:16px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.form-group label{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);}
.form-group input,.form-group select,.form-group textarea{border:1px solid var(--border);border-radius:8px;padding:8px 11px;font-family:inherit;font-size:13px;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);}
.form-group textarea{resize:vertical;min-height:65px;}
.optional-label{font-size:10px;color:var(--muted);margin-left:3px;font-weight:400;text-transform:none;letter-spacing:0;}
.modal-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:4px;}
.btn-cancel{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:7px 15px;font-family:inherit;font-size:13px;cursor:pointer;}
.btn-save{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 17px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;}
.btn-save:hover{opacity:.88;}

/* pomodoro settings modal */
.pomo-modal .modal{width:340px;}
.pomo-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.pomo-row label{font-size:13px;color:var(--text);}
.pomo-row input[type=number]{width:64px;border:1px solid var(--border);border-radius:7px;padding:5px 9px;font-family:inherit;font-size:13px;background:var(--bg);color:var(--text);outline:none;text-align:center;}
.pomo-row input[type=number]:focus{border-color:var(--accent);}
</style>
</head>
<body>

<header class="topbar">
  <div class="brand-wrap">
    <svg id="brand-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="brand">Day<em>break</em></div>
  </div>
  <div class="today-pill" id="today-pill"></div>
  <div class="spacer"></div>

  <!-- Pomodoro bar -->
  <div class="pomo-bar">
    <div class="pomo-task-name" id="pomo-task-name">No task selected</div>
    <div class="pomo-display" id="pomo-display">25:00</div>
    <button class="pomo-btn" id="pomo-play" onclick="pomoToggle()" title="Start / Pause">▶</button>
    <button class="pomo-btn" onclick="pomoReset()" title="Reset">↺</button>
    <div class="pomo-sessions" id="pomo-dots"></div>
    <button class="pomo-settings-btn" onclick="openPomoSettings()" title="Settings">⚙</button>
  </div>

  <div class="stats-inline">
    <span class="stat-inline"><strong id="stat-today">0</strong> today</span>
    <span class="stat-inline"><strong id="stat-done">0</strong> done</span>
    <span class="stat-inline" id="stat-overdue-wrap" style="display:none"><strong id="stat-overdue" style="color:var(--red)">0</strong> overdue</span>
  </div>
  <button class="btn-add" onclick="openModal()">+ Add task</button>
</header>

<div class="body">
  <aside class="panel-left">
    <div class="panel-header">
      <h2>Tasks</h2>
      <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setFilter('today',this)">Today</button>
        <button class="filter-btn" onclick="setFilter('upcoming',this)">Upcoming</button>
        <button class="filter-btn" onclick="setFilter('done',this)">Done</button>
      </div>
    </div>
    <div class="quick-add">
      <input class="quick-input" id="quick-input" placeholder="Quick add — press Enter…" onkeydown="quickAdd(event)">
      <button class="quick-submit" onclick="quickAddBtn()">Add</button>
    </div>
    <div class="tasks-scroll" id="tasks-list"></div>
  </aside>

  <div class="panel-right">
    <div id="calendar"></div>
  </div>
</div>

<!-- Task modal -->
<div class="modal-backdrop" id="modal" onclick="handleBackdropClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="modal-title">New Task</h2>
    <div class="form-group">
      <label>Title</label>
      <input id="f-title" type="text" placeholder="What needs doing?">
    </div>
    <div class="form-group">
      <label>Notes <span class="optional-label">optional</span></label>
      <textarea id="f-desc" placeholder="Any extra details…"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Due date <span class="optional-label">optional</span></label>
        <input id="f-date" type="date">
      </div>
      <div class="form-group">
        <label>Priority <span class="optional-label">optional</span></label>
        <select id="f-priority">
          <option value="">— none —</option>
          <option value="high">🔴 High</option>
          <option value="medium">🟡 Medium</option>
          <option value="low">🟢 Low</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Category <span class="optional-label">optional</span></label>
      <input id="f-cat" type="text" placeholder="e.g. work, personal, errands…">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveTask()">Save</button>
    </div>
  </div>
</div>

<!-- Pomodoro settings modal -->
<div class="modal-backdrop pomo-modal" id="pomo-modal" onclick="handlePomoBackdrop(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>Timer settings</h2>
    <div class="pomo-row">
      <label>Focus (minutes)</label>
      <input type="number" id="ps-work" min="1" max="60" value="25">
    </div>
    <div class="pomo-row">
      <label>Short break</label>
      <input type="number" id="ps-short" min="1" max="30" value="5">
    </div>
    <div class="pomo-row">
      <label>Long break</label>
      <input type="number" id="ps-long" min="1" max="60" value="15">
    </div>
    <div class="pomo-row">
      <label>Sessions before long break</label>
      <input type="number" id="ps-rounds" min="1" max="10" value="4">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closePomoSettings()">Cancel</button>
      <button class="btn-save" onclick="savePomoSettings()">Save</button>
    </div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────
let tasks = [], filter = 'all', editingId = null, calendarObj = null;
let dragSrcId = null;

// Pomodoro state
let pomo = {
  workMins: 25, shortMins: 5, longMins: 15, rounds: 4,
  sessionsDone: 0, isBreak: false,
  secsLeft: 25*60, running: false, taskId: null, taskName: null,
  interval: null
};

// ── Helpers ───────────────────────────────────
const today = () => new Date().toISOString().slice(0,10);
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d){
  if(!d) return '';
  const [y,m,day]=d.split('-'), t=today();
  if(d===t) return 'today';
  const diff=Math.round((new Date(d+'T00:00:00')-new Date(t+'T00:00:00'))/86400000);
  if(diff===1) return 'tomorrow';
  if(diff===-1) return 'yesterday';
  return `${day}/${m}/${y}`;
}

// ── Dynamic icon ──────────────────────────────
function getTimeOfDay(){
  const h = new Date().getHours();
  if(h>=5  && h<10) return 'sunrise';
  if(h>=10 && h<17) return 'sun';
  if(h>=17 && h<20) return 'sunset';
  return 'moon';
}

const ICONS = {
  sunrise: `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="sky-r" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fde68a"/><stop offset="100%" stop-color="#fca5a5"/></linearGradient></defs>
    <circle cx="16" cy="20" r="7" fill="#f97316"/>
    <rect x="15" y="2" width="2" height="4" rx="1" fill="#fbbf24"/>
    <rect x="15" y="26" width="2" height="4" rx="1" fill="#fbbf24" opacity=".3"/>
    <rect x="2" y="15" width="4" height="2" rx="1" fill="#fbbf24"/>
    <rect x="26" y="15" width="4" height="2" rx="1" fill="#fbbf24"/>
    <rect x="5.5" y="5.5" width="4" height="2" rx="1" fill="#fbbf24" transform="rotate(45 7.5 6.5)"/>
    <rect x="22.5" y="5.5" width="4" height="2" rx="1" fill="#fbbf24" transform="rotate(-45 24.5 6.5)"/>
    <rect x="1" y="23" width="30" height="2" rx="1" fill="#c94a2b" opacity=".9"/>
    <path d="M4 23 Q16 13 28 23" stroke="#f97316" stroke-width="1.5" fill="none" opacity=".5"/>
  </svg>`,

  sun: `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="16" cy="16" r="7" fill="#f97316"/>
    <rect x="15" y="1" width="2" height="5" rx="1" fill="#fbbf24"/>
    <rect x="15" y="26" width="2" height="5" rx="1" fill="#fbbf24"/>
    <rect x="1" y="15" width="5" height="2" rx="1" fill="#fbbf24"/>
    <rect x="26" y="15" width="5" height="2" rx="1" fill="#fbbf24"/>
    <rect x="4" y="4" width="5" height="2" rx="1" fill="#fbbf24" transform="rotate(45 6.5 5)"/>
    <rect x="23" y="4" width="5" height="2" rx="1" fill="#fbbf24" transform="rotate(-45 25.5 5)"/>
    <rect x="4" y="26" width="5" height="2" rx="1" fill="#fbbf24" transform="rotate(-45 6.5 27)"/>
    <rect x="23" y="26" width="5" height="2" rx="1" fill="#fbbf24" transform="rotate(45 25.5 27)"/>
  </svg>`,

  sunset: `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="16" cy="22" r="7" fill="#c94a2b"/>
    <rect x="15" y="2" width="2" height="4" rx="1" fill="#f97316"/>
    <rect x="2" y="15" width="4" height="2" rx="1" fill="#f97316"/>
    <rect x="26" y="15" width="4" height="2" rx="1" fill="#f97316"/>
    <rect x="5.5" y="5.5" width="4" height="2" rx="1" fill="#f97316" transform="rotate(45 7.5 6.5)"/>
    <rect x="22.5" y="5.5" width="4" height="2" rx="1" fill="#f97316" transform="rotate(-45 24.5 6.5)"/>
    <rect x="1" y="21" width="30" height="2" rx="1" fill="#7a3020" opacity=".8"/>
    <path d="M4 21 Q16 11 28 21" stroke="#c94a2b" stroke-width="1.5" fill="none" opacity=".5"/>
    <path d="M2 25 Q8 23 14 25 Q20 27 28 25" stroke="#f97316" stroke-width="1" fill="none" opacity=".4"/>
  </svg>`,

  moon: `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M22 16 A10 10 0 1 1 16 6 A7 7 0 0 0 22 16Z" fill="#c49a14"/>
    <circle cx="24" cy="8" r="1.2" fill="#fde68a" opacity=".8"/>
    <circle cx="8" cy="6" r=".8" fill="#fde68a" opacity=".6"/>
    <circle cx="26" cy="22" r="1" fill="#fde68a" opacity=".7"/>
    <circle cx="5" cy="20" r=".7" fill="#fde68a" opacity=".5"/>
    <circle cx="15" cy="27" r=".6" fill="#fde68a" opacity=".4"/>
  </svg>`
};

function updateIcon(){
  const tod = getTimeOfDay();
  const svgEl = document.getElementById('brand-icon');
  svgEl.innerHTML = ICONS[tod].replace(/<svg[^>]*>/,'').replace('</svg>','');

  // Also update favicon
  const svgStr = ICONS[tod];
  const blob = new Blob([svgStr], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const link = document.getElementById('favicon-link');
  if(link._prevUrl) URL.revokeObjectURL(link._prevUrl);
  link._prevUrl = url;
  link.href = url;
}

// ── API ───────────────────────────────────────
async function api(method, path, body){
  const r = await fetch('/api'+path, {method, headers:{'Content-Type':'application/json'}, body: body?JSON.stringify(body):undefined});
  return r.json();
}
async function loadTasks(){ tasks = await api('GET','/tasks'); renderAll(); }

// ── Render all ────────────────────────────────
function renderAll(){ renderTasks(); renderCalendar(); renderTopStats(); }

function renderTopStats(){
  const t=today();
  const tc=tasks.filter(x=>x.due_date===t&&!x.completed).length;
  const dc=tasks.filter(x=>x.completed).length;
  const oc=tasks.filter(x=>x.due_date&&x.due_date<t&&!x.completed).length;
  document.getElementById('stat-today').textContent=tc;
  document.getElementById('stat-done').textContent=dc;
  document.getElementById('stat-overdue').textContent=oc;
  document.getElementById('stat-overdue-wrap').style.display=oc>0?'':'none';
  const d=new Date();
  document.getElementById('today-pill').textContent=d.toLocaleDateString('en-GB',{weekday:'long',month:'long',day:'numeric'});
}

function renderTasks(){
  const t=today();
  let list=tasks.filter(x=>{
    if(filter==='today')    return x.due_date===t&&!x.completed;
    if(filter==='upcoming') return x.due_date&&x.due_date>t&&!x.completed;
    if(filter==='done')     return x.completed;
    return true;
  });
  const el=document.getElementById('tasks-list');
  if(!list.length){el.innerHTML='<div class="empty-state"><div class="e-icon">🌿</div>Nothing here yet.</div>';return;}
  if(filter==='all'){
    const overdue  = list.filter(x=>x.due_date&&x.due_date<t&&!x.completed);
    const todayL   = list.filter(x=>x.due_date===t&&!x.completed);
    const upcoming = list.filter(x=>x.due_date&&x.due_date>t&&!x.completed);
    const nodate   = list.filter(x=>!x.due_date&&!x.completed);
    const done     = list.filter(x=>x.completed);
    el.innerHTML=[
      overdue.length  ?`<div class="section-label" style="color:var(--red)">⚠ Overdue</div>`+overdue.map(taskHTML).join(''):'',
      todayL.length   ?`<div class="section-label">Today</div>`+todayL.map(taskHTML).join(''):'',
      upcoming.length ?`<div class="section-label">Upcoming</div>`+upcoming.map(taskHTML).join(''):'',
      nodate.length   ?`<div class="section-label">No date</div>`+nodate.map(taskHTML).join(''):'',
      done.length     ?`<div class="section-label">Done</div>`+done.map(taskHTML).join(''):'',
    ].join('');
  } else {
    el.innerHTML=list.map(taskHTML).join('');
  }
  initDragDrop();
}

function taskHTML(t){
  const td=today(), overdue=t.due_date&&t.due_date<td&&!t.completed;
  const isPomoActive = pomo.taskId===t.id && pomo.running;
  return `<div class="task-card${t.completed?' done':''}${isPomoActive?' pomo-active':''}" data-id="${t.id}"
    draggable="true">
    <span class="drag-handle" title="Drag to reorder">⠿</span>
    <button class="check-btn${t.completed?' checked':''}" onclick="toggleTask(${t.id})"></button>
    <div class="task-body">
      <div class="task-title">${esc(t.title)}</div>
      ${t.description?`<div class="task-desc">${esc(t.description)}</div>`:''}
      <div class="task-meta">
        ${t.priority?`<span class="tag priority-${t.priority}">${t.priority}</span>`:''}
        ${t.category?`<span class="tag cat">${esc(t.category)}</span>`:''}
        ${t.due_date?`<span class="tag ${overdue?'overdue':'date'}">${overdue?'⚠ ':''}${fmtDate(t.due_date)}</span>`:''}
      </div>
    </div>
    <div class="task-actions">
      <button class="icon-btn pomo-start" onclick="pomoSelectTask(${t.id},'${esc(t.title)}')" title="Focus on this task">🍅</button>
      <button class="icon-btn" onclick="openModal(${t.id})" title="Edit">✎</button>
      <button class="icon-btn del" onclick="deleteTask(${t.id})" title="Delete">✕</button>
    </div>
  </div>`;
}

// ── Drag & drop (task list) ───────────────────
function initDragDrop(){
  document.querySelectorAll('.task-card[draggable]').forEach(card=>{
    card.addEventListener('dragstart', e=>{
      dragSrcId = parseInt(card.dataset.id);
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    card.addEventListener('dragend', ()=>{
      card.classList.remove('dragging');
      document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('drag-over'));
    });
    card.addEventListener('dragover', e=>{
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('drag-over'));
      card.classList.add('drag-over');
    });
    card.addEventListener('drop', async e=>{
      e.preventDefault();
      card.classList.remove('drag-over');
      const targetId = parseInt(card.dataset.id);
      if(dragSrcId===targetId) return;
      // Reorder in local array
      const allIds = [...document.querySelectorAll('.task-card[data-id]')].map(c=>parseInt(c.dataset.id));
      const srcIdx = allIds.indexOf(dragSrcId);
      const tgtIdx = allIds.indexOf(targetId);
      allIds.splice(srcIdx,1);
      allIds.splice(tgtIdx,0,dragSrcId);
      // Persist order
      await api('POST','/tasks/reorder',{ids:allIds});
      // Reorder local tasks array to match
      const idMap = Object.fromEntries(tasks.map(t=>[t.id,t]));
      const reordered = allIds.map(id=>idMap[id]).filter(Boolean);
      const rest = tasks.filter(t=>!allIds.includes(t.id));
      tasks = [...reordered,...rest];
      renderTasks();
    });
  });
}

// ── Calendar ──────────────────────────────────
function renderCalendar(){
  const palette=['#c94a2b','#2a5fa5','#2d7a4f','#c49a14','#7a50c0'];
  const catMap={}; let ci=0;
  const events=tasks.filter(t=>t.due_date).map(t=>{
    let color;
    if(t.completed)              color='#a09890';
    else if(t.priority==='high')   color='#b83225';
    else if(t.priority==='medium') color='#c49a14';
    else if(t.priority==='low')    color='#2d7a4f';
    else if(t.category){
      if(!catMap[t.category]) catMap[t.category]=palette[ci++%palette.length];
      color=catMap[t.category];
    } else color='#c94a2b';
    return {title:t.title,start:t.due_date,backgroundColor:color,borderColor:'transparent',textColor:'#fff',extendedProps:{id:t.id}};
  });
  if(calendarObj){calendarObj.removeAllEvents();calendarObj.addEventSource(events);return;}
  calendarObj=new FullCalendar.Calendar(document.getElementById('calendar'),{
    initialView:'dayGridMonth',
    headerToolbar:{left:'prev,next today',center:'title',right:'dayGridMonth,listWeek'},
    events, height:'auto',
    editable: true,
    eventClick: info=>openModal(info.event.extendedProps.id),
    eventDrop: async info=>{
      const id=info.event.extendedProps.id;
      const newDate=info.event.startStr;
      const updated=await api('POST',`/tasks/${id}/reschedule`,{due_date:newDate});
      tasks=tasks.map(x=>x.id===id?updated:x);
      renderTasks();
      renderTopStats();
    }
  });
  calendarObj.render();
}

// ── Pomodoro ──────────────────────────────────
function pomoSelectTask(id, name){
  pomo.taskId=id; pomo.taskName=name;
  pomoReset();
  const el=document.getElementById('pomo-task-name');
  el.textContent=name; el.classList.add('active');
  // Request notification permission
  if(Notification.permission==='default') Notification.requestPermission();
}

function pomoToggle(){
  if(pomo.running){ pomoStop(); } else { pomoStart(); }
}

function pomoStart(){
  if(pomo.secsLeft<=0) pomoReset();
  pomo.running=true;
  document.getElementById('pomo-play').textContent='⏸';
  document.getElementById('pomo-play').classList.add('running');
  pomo.interval=setInterval(()=>{
    pomo.secsLeft--;
    updatePomoDisplay();
    if(pomo.secsLeft<=0) pomoFinish();
  },1000);
}

function pomoStop(){
  pomo.running=false;
  clearInterval(pomo.interval);
  document.getElementById('pomo-play').textContent='▶';
  document.getElementById('pomo-play').classList.remove('running');
}

function pomoReset(){
  pomoStop();
  pomo.isBreak=false;
  pomo.secsLeft=pomo.workMins*60;
  updatePomoDisplay();
}

function pomoFinish(){
  pomoStop();
  if(!pomo.isBreak){
    pomo.sessionsDone++;
    updatePomoDots();
    const isLong=pomo.sessionsDone%pomo.rounds===0;
    pomo.isBreak=true;
    pomo.secsLeft=(isLong?pomo.longMins:pomo.shortMins)*60;
    notify(isLong?`🎉 Long break! ${pomo.longMins} minutes.`:`✅ Break time! ${pomo.shortMins} minutes.`);
  } else {
    pomo.isBreak=false;
    pomo.secsLeft=pomo.workMins*60;
    notify(`🍅 Back to focus${pomo.taskName?' — '+pomo.taskName:''}!`);
  }
  updatePomoDisplay();
}

function updatePomoDisplay(){
  const m=String(Math.floor(pomo.secsLeft/60)).padStart(2,'0');
  const s=String(pomo.secsLeft%60).padStart(2,'0');
  const el=document.getElementById('pomo-display');
  el.textContent=`${m}:${s}`;
  el.className='pomo-display'+(pomo.isBreak?' break':'');
  document.title=pomo.running?`${m}:${s} — Daybreak`:'Daybreak — Daily Planner';
}

function updatePomoDots(){
  const wrap=document.getElementById('pomo-dots');
  let html='';
  for(let i=0;i<pomo.rounds;i++){
    html+=`<div class="pomo-dot${i<(pomo.sessionsDone%pomo.rounds||pomo.rounds)?pomo.sessionsDone>0?' done':'':''}"${i<pomo.sessionsDone%pomo.rounds||(pomo.sessionsDone>0&&pomo.sessionsDone%pomo.rounds===0)?' style="background:var(--accent)"':''}></div>`;
  }
  // Simpler dot render
  wrap.innerHTML='';
  for(let i=0;i<pomo.rounds;i++){
    const dot=document.createElement('div');
    dot.className='pomo-dot';
    if(i<pomo.sessionsDone%pomo.rounds||(pomo.sessionsDone>=pomo.rounds&&pomo.sessionsDone%pomo.rounds===0&&i===pomo.rounds-1)) dot.classList.add('done');
    wrap.appendChild(dot);
  }
}

function notify(msg){
  if(Notification.permission==='granted'){
    new Notification('Daybreak',{body:msg,icon:''});
  }
}

function openPomoSettings(){
  document.getElementById('ps-work').value=pomo.workMins;
  document.getElementById('ps-short').value=pomo.shortMins;
  document.getElementById('ps-long').value=pomo.longMins;
  document.getElementById('ps-rounds').value=pomo.rounds;
  document.getElementById('pomo-modal').classList.add('open');
}
function closePomoSettings(){ document.getElementById('pomo-modal').classList.remove('open'); }
function handlePomoBackdrop(e){ if(e.target===document.getElementById('pomo-modal')) closePomoSettings(); }
function savePomoSettings(){
  pomo.workMins=parseInt(document.getElementById('ps-work').value)||25;
  pomo.shortMins=parseInt(document.getElementById('ps-short').value)||5;
  pomo.longMins=parseInt(document.getElementById('ps-long').value)||15;
  pomo.rounds=parseInt(document.getElementById('ps-rounds').value)||4;
  pomoReset();
  updatePomoDots();
  closePomoSettings();
}

// ── Task interactions ─────────────────────────
function setFilter(f,btn){
  filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTasks();
}
async function toggleTask(id){
  const t=await api('POST',`/tasks/${id}/toggle`);
  tasks=tasks.map(x=>x.id===id?t:x);
  renderAll();
}
async function deleteTask(id){
  if(!confirm('Delete this task?')) return;
  await api('DELETE',`/tasks/${id}`);
  tasks=tasks.filter(x=>x.id!==id);
  renderAll();
}
async function quickAdd(e){
  if(e.key!=='Enter') return;
  const input=document.getElementById('quick-input');
  const title=input.value.trim();
  if(!title) return;
  const created=await api('POST','/tasks',{title,description:'',due_date:today(),priority:'',category:''});
  tasks.unshift(created);
  input.value='';
  renderAll();
}
async function quickAddBtn(){ await quickAdd({key:'Enter'}); }

// ── Modal ─────────────────────────────────────
function openModal(id=null){
  editingId=id;
  const t=id?tasks.find(x=>x.id===id):null;
  document.getElementById('modal-title').textContent=t?'Edit Task':'New Task';
  document.getElementById('f-title').value=t?.title||'';
  document.getElementById('f-desc').value=t?.description||'';
  document.getElementById('f-date').value=t?.due_date||today();
  document.getElementById('f-priority').value=t?.priority||'';
  document.getElementById('f-cat').value=t?.category||'';
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),50);
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); editingId=null; }
function handleBackdropClick(e){ if(e.target===document.getElementById('modal')) closeModal(); }

async function saveTask(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){alert('Please enter a title.');return;}
  const data={
    title,
    description:document.getElementById('f-desc').value.trim(),
    due_date:document.getElementById('f-date').value||null,
    priority:document.getElementById('f-priority').value,
    category:document.getElementById('f-cat').value.trim()
  };
  if(editingId){
    const updated=await api('PUT',`/tasks/${editingId}`,{...tasks.find(x=>x.id===editingId),...data});
    tasks=tasks.map(x=>x.id===editingId?updated:x);
  } else {
    tasks.unshift(await api('POST','/tasks',data));
  }
  closeModal(); renderAll();
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ closeModal(); closePomoSettings(); }
  if(e.key==='n'&&e.metaKey){e.preventDefault();openModal();}
  if(e.key===' '&&e.metaKey){e.preventDefault();pomoToggle();}
});

// ── Init ──────────────────────────────────────
updateIcon();
setInterval(updateIcon, 60*1000); // check every minute
updatePomoDots();
loadTasks();
</script>
